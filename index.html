<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branch Search</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fbe9e7, #f5f5f5);
            min-height: 100vh;
            padding: 40px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        .title {
            text-align: center;
            font-size: 40px;
            font-weight: bold;
            color: #5d1a1a;
            margin-bottom: 30px;
        }

        .search-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(93, 26, 26, 0.15);
            margin-bottom: 30px;
        }

        .search-box input {
            width: 100%;
            padding: 18px;
            border: 2px solid #eee;
            border-radius: 12px;
            background: #f8f1f1;
            font-size: 18px;
            outline: none;
            transition: 0.3s;
        }

        .search-box input:focus {
            border-color: #7b1f1f;
        }

        .card {
            display: none;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(93, 26, 26, 0.15);
            animation: fade 0.4s ease;
        }

        @keyframes fade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .info {
            background: #fff7f7;
            padding: 18px;
            border-radius: 14px;
            border-left: 5px solid #7b1f1f;
            box-shadow: 0 4px 10px rgba(123, 31, 31, 0.08);
        }

        .label {
            font-size: 13px;
            color: #8b5a5a;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .value {
            font-size: 16px;
            color: #3b0d0d;
            font-weight: 600;
            word-break: break-word;
        }

        .address-box {
            grid-column: 1 / -1;
        }

        .no-result {
            text-align: center;
            color: #b71c1c;
            font-size: 18px;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="title">Branch Search</div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search Br. No. or Branch Name...">
    </div>

    <div class="card" id="resultCard">
        <div class="grid">
            <div class="info">
                <div class="label">Branch No</div>
                <div class="value" id="brno"></div>
            </div>

            <div class="info">
                <div class="label">Branch Name</div>
                <div class="value" id="branch"></div>
            </div>

            <div class="info">
                <div class="label">Division</div>

            </div>

            <div class="info">
                <div class="label">Zone</div>
                <div class="value" id="zone"></div>
            </div>

            <div class="info">

            </div>

            <div class="info">
                <div class="label">Phone No 2</div>

            </div>

            <div class="info address-box">
                <div class="label">Address</div>
                <div class="value" id="address"></div>
            </div>
        </div>
    </div>

    <div class="no-result" id="noResult">No Branch Found</div>
</div>

    const searchInput = document.getElementById('searchInput');
    const resultCard = document.getElementById('resultCard');
    const noResult = document.getElementById('noResult');

    searchInput.addEventListener('input', function() {
        const query = this.value.toLowerCase().trim();

        if (query === "") {
            resultCard.style.display = "none";
            noResult.style.display = "none";
            return;
        }

        const found = branches.find(b => 
            b["Br. No."].toLowerCase().includes(query) || 
            b["Branch Name"].toLowerCase().includes(query)
        );

        if (found) {
            document.getElementById('brno').textContent = found["Br. No."];
            document.getElementById('branch').textContent = found["Branch Name"];
            document.getElementById('division').textContent = found["Division"];
            document.getElementById('zone').textContent = found["Zone"];
            document.getElementById('phone1').textContent = found["Ph No 1"] || "-";
            document.getElementById('phone2').textContent = found["Ph No 2"] || "-";
            document.getElementById('address').textContent = found["Address"];

            resultCard.style.display = "block";
            noResult.style.display = "none";
        } else {
            resultCard.style.display = "none";
            noResult.style.display = "block";
        }
    });
